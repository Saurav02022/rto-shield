name: deploy-frontend

# Deploy frontend to Cloud Run only when `frontend/` (or this workflow) changes on `main`.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: ${{ vars.AR_REPO }}
  CLOUD_RUN_SERVICE: ${{ vars.FRONTEND_CLOUD_RUN_SERVICE }}
  SMOKE_PORT: "18181"

jobs:
  build-smoke-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Docker build (frontend)
        working-directory: frontend
        env:
          IMAGE_LOCAL: ghcr-frontend-local-${{ github.run_id }}:smoke
        run: |
          docker build \
            --build-arg "NEXT_PUBLIC_BACKEND_API_URL=${{ vars.NEXT_PUBLIC_BACKEND_API_URL }}" \
            -t "${IMAGE_LOCAL}" \
            .

      - name: Smoke test container
        env:
          IMAGE_LOCAL: ghcr-frontend-local-${{ github.run_id }}:smoke
        run: |
          set -euo pipefail
          CID=$(docker run -d --rm \
            -p "127.0.0.1:${SMOKE_PORT}:8080" \
            -e BACKEND_API_URL=http://127.0.0.1:59999 \
            -e NEXT_PUBLIC_BACKEND_API_URL=http://127.0.0.1:59999 \
            "${IMAGE_LOCAL}")
          trap 'docker logs "$CID" 2>&1 | tail -80 || true; docker stop "$CID" >/dev/null 2>&1 || true' EXIT

          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${SMOKE_PORT}/api/health"; then
              echo ""
              echo "Smoke OK after ${i} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "Frontend smoke failed" >&2
          exit 1

      - name: Tag for Artifact Registry
        working-directory: frontend
        env:
          IMAGE_LOCAL: ghcr-frontend-local-${{ github.run_id }}:smoke
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend
        run: |
          docker tag "${IMAGE_LOCAL}" "${IMAGE}:${{ github.sha }}"
          docker tag "${IMAGE_LOCAL}" "${IMAGE}:latest"

      - name: Push image
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend
        run: |
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy Cloud Run (frontend)
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image "${IMAGE}:${{ github.sha }}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "BACKEND_API_URL=${{ vars.BACKEND_API_URL }},NEXT_PUBLIC_BACKEND_API_URL=${{ vars.NEXT_PUBLIC_BACKEND_API_URL }}"

      - run: |
          URL=$(gcloud run services describe "${CLOUD_RUN_SERVICE}" --region "${GCP_REGION}" --format 'value(status.url)')
          echo "**Frontend:** ${URL}" >> "$GITHUB_STEP_SUMMARY"
